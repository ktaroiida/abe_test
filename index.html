<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鳥獣被害報告・文字起こしツール</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.recording-pulse {
animation: pulse 1.5s infinite;
}
@keyframes pulse {
0% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.1); opacity: 0.7; }
100% { transform: scale(1); opacity: 1; }
}
body {
background-color: #f0f4f0;
background-image: radial-gradient(#d1dbd1 0.5px, transparent 0.5px);
background-size: 20px 20px;
}
</style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">
<div class="max-w-3xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border-t-8 border-green-600">
<!-- ヘッダーデザイン -->
<div class="bg-green-50 p-6 border-b border-green-100 flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="text-3xl">🐗</span>
<div>
<h1 class="text-xl font-bold text-green-900">鳥獣被害報告</h1>
<p class="text-xs text-green-700 font-medium">Field Report: Wildlife Damage</p>
</div>
</div>
<div id="status" class="text-sm font-bold text-slate-500 bg-white px-4 py-2 rounded-full shadow-sm border border-slate-100 flex items-center gap-2">
状態: 待機中
</div>
</div>

<div class="p-8">
<!-- 文字起こしエリア -->
<div class="relative mb-6">
<label class="block text-sm font-bold text-slate-700 mb-2">報告詳細（音声入力・手入力可）</label>
<!-- inputイベントで手動編集を検知 -->
<textarea id="result-area"
class="w-full h-96 p-5 border-2 border-slate-100 bg-slate-50 rounded-2xl focus:border-green-500 focus:bg-white focus:outline-none transition-all resize-none text-slate-800 leading-relaxed shadow-inner"
placeholder="「報告開始」ボタンを押して話すか、直接入力してください..."></textarea>

<div id="interim-display" class="absolute bottom-4 left-5 right-5 text-green-600 italic pointer-events-none opacity-70"></div>
</div>

<!-- 操作パネル -->
<div class="flex flex-wrap gap-4">
<button id="start-btn"
class="flex-[2] bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-green-200 transition-all flex items-center justify-center gap-2 transform active:scale-95">
<span class="text-xl">🎤</span>
<span>報告開始 (録音)</span>
</button>
<button id="save-btn"
class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-blue-100 transition-all flex items-center justify-center gap-2">
<span>💾</span>
<span>ファイル保存</span>
</button>
<button id="reset-btn"
class="bg-slate-100 hover:bg-orange-100 hover:text-orange-600 text-slate-500 font-bold py-4 px-6 rounded-2xl transition-all flex items-center justify-center gap-2">
<span>🔄</span>
<span>リセット</span>
</button>
</div>

<!-- 保存完了メッセージ -->
<div id="save-toast" class="fixed top-10 right-10 bg-blue-600 text-white px-6 py-3 rounded-xl shadow-2xl transform translate-x-80 transition-transform duration-300 z-50 flex items-center gap-2 font-bold">
<span>📂</span> ファイルを保存しました
</div>

<!-- ガイドライン -->
<div class="mt-8 flex gap-4 p-4 bg-orange-50 rounded-xl border border-orange-100 items-start">
<span class="text-2xl mt-1">🐾</span>
<div>
<h2 class="text-sm font-bold text-orange-900">報告のポイント:</h2>
<p class="text-xs text-orange-800 mt-1 leading-relaxed">
バックスペース等で内容を自由に修正できます。リセットボタンで全ての会話内容を初期化します。
</p>
</div>
</div>
</div>

<div class="bg-slate-50 p-4 text-center text-[10px] text-slate-400 border-t border-slate-100 italic">
Wildlife Damage Reporting System - Powered by Web Speech API
</div>
</div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
document.getElementById('status').innerText = "エラー: 未対応ブラウザ";
document.getElementById('start-btn').disabled = true;
} else {
let recognition;
const startBtn = document.getElementById('start-btn');
const saveBtn = document.getElementById('save-btn');
const resetBtn = document.getElementById('reset-btn');
const resultArea = document.getElementById('result-area');
const interimDisplay = document.getElementById('interim-display');
const statusDiv = document.getElementById('status');
const saveToast = document.getElementById('save-toast');

let fixedText = ''; // 確定済みのテキスト
let isRecording = false;

// 重要: テキストエリアの手動編集をプログラム側の変数に同期させる
resultArea.addEventListener('input', (e) => {
fixedText = e.target.value;
});

function initRecognition() {
if (recognition) {
recognition.onstart = null;
recognition.onresult = null;
recognition.onerror = null;
recognition.onend = null;
try { recognition.abort(); } catch(e) {}
}

recognition = new SpeechRecognition();
recognition.lang = 'ja-JP';
recognition.interimResults = true;
recognition.continuous = true;

recognition.onstart = () => {
isRecording = true;
statusDiv.innerHTML = '<span class="flex h-2 w-2 rounded-full bg-red-500 recording-pulse"></span> 録音中';
statusDiv.classList.add('text-red-600');
startBtn.innerText = "🎤 録音を停止";
startBtn.classList.replace('bg-green-600', 'bg-red-600');
startBtn.classList.replace('hover:bg-green-700', 'hover:bg-red-700');

if (fixedText === '') {
fixedText = `--- 報告開始時刻: ${new Date().toLocaleString('ja-JP')} ---\n`;
resultArea.value = fixedText;
}
};

recognition.onerror = (event) => {
if (event.error !== 'aborted') {
statusDiv.innerText = `エラー: ${event.error}`;
}
isRecording = false;
stopRecognitionUI();
};

recognition.onend = () => {
isRecording = false;
stopRecognitionUI();
};

recognition.onresult = (event) => {
let interimTranscript = '';
let sessionFinal = '';

for (let i = event.resultIndex; i < event.results.length; ++i) {
const transcript = event.results[i][0].transcript;
if (event.results[i].isFinal) {
sessionFinal += transcript + ' ';
} else {
interimTranscript += transcript;
}
}

// 以前の確定分(手動修正含む) + 今回新しく確定した分
fixedText += sessionFinal;
resultArea.value = fixedText;
interimDisplay.innerText = interimTranscript;

// スクロール位置の調整
resultArea.scrollTop = resultArea.scrollHeight;
};
}

initRecognition();

startBtn.addEventListener('click', () => {
if (!isRecording) {
recognition.start();
} else {
recognition.stop();
}
});

// ファイルとして保存
saveBtn.addEventListener('click', () => {
const content = resultArea.value;
if (!content) {
alert("保存する内容がありません。");
return;
}

const now = new Date();
const fileName = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}_鳥獣被害報告.txt`;

const blob = new Blob([content], { type: 'text/plain' });
const link = document.createElement('a');
link.href = URL.createObjectURL(blob);
link.download = fileName;
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
URL.revokeObjectURL(link.href);

saveToast.style.transform = "translateX(0)";
setTimeout(() => {
saveToast.style.transform = "translateX(25rem)";
}, 3000);
});

// リセットボタン（消去の代わりに実装）
resetBtn.addEventListener('click', () => {
if (window.confirm('話した内容をすべてリセットして最初からやり直しますか？')) {
recognition.abort();
isRecording = false;

fixedText = '';
resultArea.value = '';
interimDisplay.innerText = '';

initRecognition();
stopRecognitionUI();
}
});

function stopRecognitionUI() {
statusDiv.innerHTML = '状態: 待機中';
statusDiv.classList.remove('text-red-600');
startBtn.innerText = "🎤 報告開始 (録音)";
startBtn.classList.replace('bg-red-600', 'bg-green-600');
startBtn.classList.replace('hover:bg-red-700', 'hover:bg-green-700');
}
}
</script>
</body>
</html>
